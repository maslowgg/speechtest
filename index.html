          { id: 10, categoryId: 'c2', title: '「您是總務主任，請於學生朝會宣導愛惜公物的重要性及運動器材、兒童遊樂設施和學校各項設備的正確使用方式。」', analysis: '培養學生公德心，並預防因不當使用遊具造成的校園安全事故。', points: ['公德心建立：傳達「學校就是我們的家」，公物需要每一位同學共同愛護。', '安全操作規範：針對常發生意外的遊具（如鞦韆、溜滑梯）說明正確且安全的使用步驟。', '通報與獎勵機制：鼓勵同學若發現公物損壞，不靠近並主動通報老師，共同維護校園安全。'] },
          { id: 11, categoryId: 'c2', title: '「您是學務主任，請於教師晨會時，向全體教師宣導正向管教的意涵及實施策略。」', analysis: '強化教師法治觀念，落實零體罰政策，並提供具體的輔導管教策略。', points: ['法規與零體罰底線：重申教育法規要求，明確定義何謂體罰與不當管教，保障師生權益。', '正向管教核心理念：宣導「以同理代替指責、以引導代替懲罰」的教育心法。', '行政協同支援：強調學務處與輔導處會作為老師的後盾，遇到困難個案請隨時啟動三級輔導。'] },
          { id: 12, categoryId: 'c2', title: '「您是學務主任，因應教育部最新規範，學校即將實施全新的「校園行動載具(手機)管理規範」，請在家長代表大會上向家長說明新制重點與配合事項。」', analysis: '化解家長對沒收手機的反彈，說明管理機制的正當性與具體流程。', points: ['政策初衷與理念：說明新制是為了保護學生視力、減少上課分心及避免網路霸凌。', '規範細節與流程：清楚說明「申請帶機條件、到校集中保管方式、違規處置」等配套。', '親師合作呼籲：懇請家長在家中也建立手機使用規範，親師一致幫助孩子自律。'] },
          { id: 13, categoryId: 'c2', title: '「您是學務主任，媒體報導學生使用電子菸的情事頻傳，請於朝會時，向全體師生加強電子菸危害與菸害防制宣導。」', analysis: '破解學生對電子菸的迷思（以為無害），嚴正宣導校規與健康防制。', points: ['破解電子菸迷思：強調電子菸不僅含尼古丁會成癮，還有重金屬與致癌物，且常偽裝成糖果零食。', '勇敢拒絕技巧：教導學生如何面對同儕誘惑，堅定說不。', '校規處置與通報：嚴正聲明校園全面禁菸，若發現違規將依校規懲處並啟動戒菸輔導。'] },
          { id: 14, categoryId: 'c2', title: '「您是學務主任，面臨目前MeToo事件頻上新聞版面，請於朝會時，向全體師生進行性別平等教育宣導。」', analysis: '建立學生的身體自主權觀念，宣導性平通報機制，落實校園性平零容忍。', points: ['身體自主權：宣導每個人都是自己身體的主人，學習尊重他人的界線。', '辨識性騷擾：說明只要讓自己感覺不舒服、被冒犯的言語或觸碰，就可能是性騷擾。', '勇敢發聲不隱忍：宣導校內的求助管道，保證學校會嚴密保護通報者並啟動性平調查。'] },
          { id: 15, categoryId: 'c2', title: '「您是輔導主任，請於朝會時，針對媒體報導，學校附近放學期間發生重大車禍事件，向全校師生進行安全教育及生命教育宣導。」', analysis: '藉由時事進行危機機會教育，同時安撫學生可能產生的恐懼心理。', points: ['事件反思與哀悼：以沉重但冷靜的語氣簡述事件，帶入生命脆弱與寶貴的生命教育。', '落實交安守則：強烈要求遵守「路口停看聽、不滑手機、穿著亮色衣物」等保命原則。', '心理關懷與輔導：告知若有同學因新聞感到害怕或焦慮，輔導室隨時敞開大門提供傾聽。'] },
          { id: 16, categoryId: 'c2', title: '「您是輔導主任，請於導師會報時，向全體導師宣導脆弱家庭辨識、關懷與通報的重要性。」', analysis: '提升導師的敏感度，建立預防網絡，確保高風險學生不漏接。', points: ['一線辨識指標：教導導師觀察學生的外觀（不明傷痕、衣著不整）、出缺席或情緒突變。', '法定通報義務：宣導24小時法定通報時效與保密原則，消除導師怕惹麻煩的疑慮。', '行政與社政介入：說明只要導師發現異狀，輔導處會立刻接手並連結社政單位資源協助。'] },
          { id: 17, categoryId: 'c2', title: '「您是輔導主任，學生於校園中使用髒話、不雅言詞及疑似言語霸凌情形日益嚴重，請於朝會中，向全體師生進行防制校園言語霸凌宣導。」', analysis: '導正校園次文化，區分「開玩笑」與「言語霸凌」的界線。', points: ['言語的力量：舉例說明「好話一句三冬暖，惡語傷人六月寒」，語言可以殺人。', '界定霸凌底線：強調只要讓對方感到受傷、恐懼，就不是開玩笑，而是言語霸凌。', '推動友善校園：發起「說好話運動」，並呼籲旁觀者勇敢制止或通報師長。'] },
          { id: 18, categoryId: 'c2', title: '「您是輔導主任，請於教師晨會中，向全體教師宣導說明融合教育(普特融合)的概念與作為。」', analysis: '協助普通班教師接納特殊生，消除排斥心理，並提供特教支援承諾。', points: ['零拒絕的教育愛：宣導融合教育「看見差異、欣賞多元」的核心理念。', '班級經營與調整：分享簡單實用的通用設計教學（UDL）與同儕互助策略。', '特教團隊強大後盾：承諾特教組及資源班老師會提供個別化教育計畫（IEP）諮詢與入班協助。'] },
          { id: 19, categoryId: 'c2', title: '「您是輔導主任，請於兒童節慶祝大會上，向全校師生宣導「情緒覺察」的重要性，並教導學生一個簡單的情緒調節小技巧。」', analysis: '結合節慶歡樂氣氛，進行實用的SEL（社會情緒學習）教育。', points: ['擁抱所有情緒：告訴孩子生氣、難過和開心一樣，都是正常且重要的人生夥伴。', '練習情緒覺察：引導孩子辨識身體的警訊（如心跳加快、拳頭緊握就是生氣了）。', '實作調節技巧：現場帶領全校實作一個簡單技巧（如：深呼吸烏龜法、數到十冷靜法）。'] },
          { id: 20, categoryId: 'c2', title: '「您是教務主任，請於教師晨會中，說明雙語政策相關推動規劃，並招募有志投入的教師，共同組成教學推動團隊。」', analysis: '降低教師對雙語教學的恐懼，強調行政支援，成功招募先行團隊。', points: ['政策願景與減壓：說明雙語是國家趨勢，但學校採「漸進式、學科知識為主、不強求全英語」的無壓模式。', '推動規劃與培力：說明未來的研習地圖與共備機制，強調大家一起學，不會讓老師單打獨鬥。', '招募誘因與邀請：提出實質誘因（如減授課、經費補助、公假研習），誠摯邀請熱血教師加入種子團隊。'] },

          // 類別三：校務說明
          { id: 21, categoryId: 'c3', title: '「您是教務主任，請於課發會會議時，向教師說明學校實施本土教育的相關內容。」', analysis: '確保本土語文課程符合法規，並結合校本特色，引導課發會委員凝聚共識。', points: ['法規對應與排課：說明課綱對本土語文的節數規定及本校各年級的排課現況。', '師資盤點與聘任：說明校內現有師資專長、認證狀況及教支人員的聘用規劃。', '融入校本特色：鼓勵將本土文化、社區踏查融入彈性學習課程，深化學習意義。'] },
          { id: 22, categoryId: 'c3', title: '「您是教務主任，請於教師專業學習社群活動時，向教師說明學校校訂課程編擬應注意重點。」', analysis: '指導教師開發具備「素養導向」且符合「學校願景」的彈性課程。', points: ['扣緊學校願景：提醒課程目標必須對應學校願景與學生圖像，形塑學校特色。', '落實素養導向：強調課程設計應連結學生生活情境，培養解決真實問題的能力。', '多元評量設計：提醒跳脫紙筆測驗，規劃實作、展演或檔案評量等多元產出。'] },
          { id: 23, categoryId: 'c3', title: '「您是教務主任，請於課發會會議時，向教師說明新學年度學校課程評鑑的實施規劃。」', analysis: '消除教師對「評鑑等於考核」的抗拒，建立課程品保的PDCA循環。', points: ['正向評鑑觀念：澄清評鑑是為了「為課程把脈、幫助學生學得更好」，而非考核教師績效。', '簡化實施流程：說明具體的自評、同儕互評期程，強調表單盡量簡化、避免行政干擾。', '評鑑結果應用：說明評鑑結果將作為明年修正教學計畫與爭取設備經費的依據。'] },
          { id: 24, categoryId: 'c3', title: '「您是教務主任，學校近期導入AI 輔助教學工具，請於教師晨會中，說服教師嘗試運用新工具來優化備課效率。」', analysis: '推動數位轉型，用「減輕工作負擔」的痛點行銷，降低科技焦慮。', points: ['直擊備課痛點：點出老師平日業務繁重，AI可以成為最得力的「數位助教」。', '實務效益展示：舉例說明AI如何快速生成教案、學習單或出題，大幅節省時間。', '增能培訓規劃：宣布將舉辦實作工作坊，手把手教學，保證零基礎也能輕鬆上手。'] },
          { id: 25, categoryId: 'c3', title: '「您是教務主任，請於寒暑假教師備課日，向教師說明學校跨領域統整課程共同備課之方式。」', analysis: '打破學科本位，建立社群共備文化，推動跨領域教學。', points: ['跨域學習的必要性：說明未來世界的挑戰不是單一學科能解決，需透過跨域統整培養核心素養。', '共備流程與模式：提出具體的共備SOP（尋找核心主題、拆解學科節數、協同教學設計）。', '行政支持與資源：承諾教務處會安排共同空堂、提供茶水經費，全力支援社群運作。'] },
          { id: 26, categoryId: 'c3', title: '「您是總務主任，學校正在規劃通學步道改善工程，請於教師晨會時，以交通安全教育的角度，向全體教師說明通學步道的設計理念。」', analysis: '爭取教師對施工期不便的諒解，並賦予硬體工程「境教」的教育意義。', points: ['現況痛點與危機：點出目前人車爭道、人行道狹窄等威脅學生安全的現狀。', '人本交通設計理念：說明新步道「退縮圍牆、綠美化、人車分道」的安全與美學設計。', '施工期間配套與期許：說明替代動線，並請老師將此工程化為交安教育的活教材。'] },
          { id: 27, categoryId: 'c3', title: '「您是總務主任，操場鋪面受損，因應改善工程，必須暫停所有操場活動課程，請於朝會向全體師生說明暫停使用相關規定及工地安全措施。」', analysis: '兼顧工地安全宣導與學生權益保障，妥善規劃體育課替代方案。', points: ['願景預告與忍耐：說明短暫的不便是為了換來未來更平整、更安全的PU跑道。', '嚴格工地安全紀律：嚴禁任何人跨越施工圍籬，違者將予重懲以維護生命安全。', '替代空間規劃：清楚說明這段期間體育課與下課活動的替代區域（如風雨球場、中庭）。'] },
          { id: 28, categoryId: 'c3', title: '「您是總務主任，請於新生家長座談會時，向家長說明校園安全防護機制的具體作法。」', analysis: '安定新生家長的心，展現學校在軟硬體防護上的嚴密規劃與執行力。', points: ['硬體防護網：介紹校內的監視死角消除計畫、電子圍籬與緊急求救鈴設置。', '人員門禁管制：說明上課期間嚴格關閉側門、實施訪客實名制換證的把關機制。', '軟體演練與教育：說明定期的防震防災演練及警民連線機制，構築安全防護網。'] },
          { id: 29, categoryId: 'c3', title: '「您是總務主任，請於朝會時，向全校師生宣導節能減碳、減塑愛地球的觀念及學校的具體措施。」', analysis: '推動環境教育，落實永續校園SDGs指標，將觀念轉化為具體行動。', points: ['環境危機與責任：以極端氣候為例，喚起師生對地球發燒的危機意識。', '校園綠色行動：宣達具體規範，如班級冷氣控溫26度、隨手關燈、減少使用一次性餐具。', '生活實踐呼籲：鼓勵大家從每天的「垃圾確實分類」做起，愛地球就在日常中。'] },
          { id: 30, categoryId: 'c3', title: '「您是學務主任，請於教師晨會中，向教師說明新學年度導師聘任方式及學校對導師班級經營的相關原則與配合事項。」', analysis: '建立公平公開的導師聘任制度，並期勉導師落實正向管教與親師溝通。', points: ['公開透明的聘任機制：說明依據校內「導師聘任辦法」，兼顧教師意願與積分公平輪替。', '班級經營核心價值：期勉導師營造友善正向的班級氣氛，重視每一位學生的獨特性。', '學務支援與親師溝通：承諾學務處是導師的後盾，並提醒導師落實與家長的良性互動。'] },

          // 類別四：危機發言
          { id: 31, categoryId: 'c4', title: '「您是新聞發言人，某日學生使用自立午餐過後，接連有四、五十位學生出現腹瀉、嘔吐等現象，已送往多所醫院急診室，請向媒體說明學校的處理方式。」', analysis: '安定社會恐慌，展現急救效率，並配合食安調查。', points: ['優先救護與陪伴：表達遺憾，說明已將學生全數送醫，並派師長至各醫院陪伴照顧。', '保全證據與通報：說明已啟動校安通報，並封存當日食餘檢體，全力配合衛生局檢驗。', '供餐應變與慰問：宣布廚房暫停運作、啟動備用供餐方案，承諾學校負起醫療與慰問責任。'] },
          { id: 32, categoryId: 'c4', title: '「您是新聞發言人，某班2位學生，於掃地時間把玩竹掃把，進而互相揮擊，致使其中1位眼睛受傷，視力嚴重受損。受傷學生家長憤怒之下，投書媒體控訴學校處理不當，肇事學生家長不聞不問，請向媒體說明學校的處理方式。」', analysis: '拆解家長怒火，澄清學校無隱匿作為，擔起調解與輔導責任。', points: ['表達痛心與還原處置：對學生重傷深感痛心，說明事發當下學校第一時間的急救與通報作為。', '積極調解與醫療協助：澄清學校並未冷處理，正積極聯繫肇事家長出面，並提供受傷學生後續醫療協助。', '強化安全與心理輔導：承諾加強校園勞動安全教育，並對目擊學生進行創傷心理輔導。'] },
          { id: 33, categoryId: 'c4', title: '「您是新聞發言人，某生在午休時，遭2名同班男同學強押到廁所脫褲子摸下體，回家後多日做惡夢，並因畏懼不敢上學，請向媒體說明學校的處理方式。」', analysis: '展現對性平事件的「零容忍」態度，恪守性平法規，保護被害人。', points: ['嚴正定調與依法通報：譴責暴力與性平違規，說明已於24小時內完成校安與社政通報。', '啟動調查與隔離保護：說明性平會已受理調查，將行為人與被害人隔離，確保被害人就學安全。', '心理復健與法治教育：安排專輔人員對被害生進行心理諮商，並對全校加強性平與身體自主權教育。'] },
